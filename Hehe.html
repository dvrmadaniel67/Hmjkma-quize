<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Love Quiz 💖</title>

<!-- Cute Smooth Font -->

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Poppins', sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;

    background:
    linear-gradient(
        135deg,
        #ff9ecf,
        #ffd1e8,
        #ffe6f5
    );
}
/* ADD this inside your CSS */

.watermark{

    position:fixed;

    bottom:15px;

    right:20px;

    color:rgba(255,255,255,0.75);

    font-size:0.9rem;

    font-weight:600;

    letter-spacing:1px;

    pointer-events:none;

    user-select:none;

    text-shadow:
    0 0 8px rgba(255,105,180,0.5);
}

/* Floating Hearts */

.hearts{
    position:fixed;
    width:100%;
    height:100%;
    overflow:hidden;
    pointer-events:none;
}

.heart{
    position:absolute;
    bottom:-30px;
    animation:floatUp linear forwards;
}

@keyframes floatUp{

    from{
        transform:translateY(0);
        opacity:1;
    }

    to{
        transform:translateY(-110vh);
        opacity:0;
    }
}

/* Card */

.card{

    width:430px;

    min-height:380px;

    background:
    rgba(255,255,255,0.3);

    backdrop-filter:blur(12px);

    border-radius:30px;

    padding:40px;

    text-align:center;

    box-shadow:
    0 0 30px
    rgba(255,105,180,0.35);

    position:relative;

    overflow:hidden;
}

/* Question */

h1{

    color:#ff1493;

    font-size:2rem;

    margin-bottom:40px;

    min-height:100px;

    font-weight:600;
}

/* Buttons Area */

.buttons{

    position:relative;

    width:100%;

    height:160px;
}

/* Buttons */

button{

    border:none;

    border-radius:50px;

    padding:14px 28px;

    font-size:1rem;

    cursor:pointer;

    transition:0.2s;

    font-weight:600;
}

#yesBtn{

    background:#ff1493;

    color:white;

    position:absolute;

    left:60px;

    top:40px;
}

#yesBtn:hover{

    transform:scale(1.08);
}

#noBtn{

    background:white;

    color:#ff1493;

    position:absolute;

    left:220px;

    top:40px;
}

/* Message */

#message{

    margin-top:20px;

    color:#d10072;

    font-size:1.2rem;

    display:none;

    font-weight:600;

    animation:pop 0.4s ease;
}

@keyframes pop{

    from{
        transform:scale(0.5);
        opacity:0;
    }

    to{
        transform:scale(1);
        opacity:1;
    }
}

</style>

</head>

<body>

<div class="hearts"></div>

<div class="card">

    <h1 id="question">
        💖 Do you hate me?
    </h1>

    <div class="buttons">

        <button id="yesBtn">
            Nooo 💕
        </button>

        <button id="noBtn">
            Yes 😭
        </button>

    </div>
    <!-- ADD this BELOW the hearts div -->

<div class="watermark">
    made by dniel.db 💖
</div>

    <div id="message"></div>

</div>

<script>

/* Questions */

const questions = [

{
    q:"💖 ng ano jode joli?",
    yes:"ehii broni💕",
    no:"eemm😭"
},

{
    q:"🍕 nni pizza ano share khny de?",
    yes:"em khlyny 🍕",
    no:"ehii😤"
},

{
    q:"🐸 ang yongla de?",
    yes:"ehii  🤣💕",
    no:"emm"
},

{
    q:"🎮 ag by baksa game thgny de ng?",
    yes:"Yesss thgny 🎮",
    no:"Nope thgyaa😭"
},

{
    q:"🌸 ang by bazar gruk gruk khny de?",
    yes:"emm khlyny💖",
    no:"ehii 😭"
},

{
    q:"🫣 ng ani de ?",
    yes:"emm 💕 ",
    no:"ehii bui ni c"
},

{
    q:"💍 Final Question: i love you 💕?",
    yes:"i love you too💕",
    no:"ehiiii 😭"
}

];

let current = 0;

/* Elements */

const question =
document.getElementById("question");

const yesBtn =
document.getElementById("yesBtn");

const noBtn =
document.getElementById("noBtn");

const message =
document.getElementById("message");

const buttonsArea =
document.querySelector(".buttons");

/* Load Question */

function loadQuestion(){

    question.innerHTML =
        questions[current].q;

    yesBtn.innerHTML =
        questions[current].yes;

    noBtn.innerHTML =
        questions[current].no;

    resetNoButton();
}

/* Reset NO button */

function resetNoButton(){

    noBtn.style.left = "220px";

    noBtn.style.top = "40px";
}

/* Move NO button */

function moveNoButton(){

    const areaRect =
        buttonsArea.getBoundingClientRect();

    const padding = 10;

    const maxX =
        areaRect.width -
        noBtn.offsetWidth -
        padding;

    const maxY =
        areaRect.height -
        noBtn.offsetHeight -
        padding;

    const minX = padding;

    const minY = padding;

    const randomX =
        Math.random() *
        (maxX - minX) + minX;

    const randomY =
        Math.random() *
        (maxY - minY) + minY;

    noBtn.style.left =
        randomX + "px";

    noBtn.style.top =
        randomY + "px";
}

/* Impossible NO button 🤣 */

noBtn.addEventListener(
    "mouseenter",
    moveNoButton
);

noBtn.addEventListener(
    "click",
    function(e){

        e.preventDefault();

        moveNoButton();
    }
);

noBtn.addEventListener(
    "touchstart",
    function(e){

        e.preventDefault();

        moveNoButton();
    }
);

/* YES button */

yesBtn.addEventListener(
    "click",
    function(){

        message.style.display =
            "block";

        const replies = [

            

            "AWWWW 🌸",

            "aww aww😭💕",

            "hehe agsioo luv u 2💅",

            "ufff tgthok mani 🤣"

        ];

        const randomReply =

            replies[
                Math.floor(
                    Math.random() *
                    replies.length
                )
            ];

        message.innerHTML =
            randomReply;

        current++;

        if(current < questions.length){

            setTimeout(function(){

                message.style.display =
                    "none";

                loadQuestion();

            },1200);

        }

        else{

            setTimeout(function(){

                question.innerHTML =
                    "🏆 QUIZ COMPLETED wgkhaa 💖";

                yesBtn.style.display =
                    "none";

                noBtn.style.display =
                    "none";

                message.style.display =
                    "block";

                message.innerHTML =
                    "ng  love  QUIZ  jeeti khaaa🤣🌸";

            },1200);
        }
    }
);

/* Initial Load */

loadQuestion();

/* Floating Hearts */

const hearts =
document.querySelector(".hearts");

function createHeart(){

    const heart =
        document.createElement("div");

    heart.classList.add("heart");

    heart.innerHTML = "💖";

    heart.style.left =
        Math.random() * 100 + "vw";

    heart.style.fontSize =
        (Math.random()*20+15) + "px";

    heart.style.animationDuration =
        (Math.random()*3+3) + "s";

    hearts.appendChild(heart);

    setTimeout(function(){

        heart.remove();

    },6000);
}

setInterval(createHeart,300);

</script>

</body>

</html>
